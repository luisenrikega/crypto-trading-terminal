name: Autonomous Crypto Scraper

on:
  schedule:
    - cron: '0 * * * *' # Cada hora
  workflow_dispatch: # Permite ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/scrape.js

      - name: Commit and Push Results
        run: |
          git config --global user.name "CryptoSignal-Bot"
          git config --global user.email "bot@cryptosignal.ai"
          git add trading_db.json
          git commit -m "chore: update market data [skip ci]" || echo "No changes to commit"
          git push
